version: "3.8"

services:
  mediabrowser:
    build: .
    container_name: mediabrowser
    ports:
      - "8000:8000"
    volumes:
      # Ton dossier downloads sur le NAS → monté en /media dans le container
      - /volume1/downloads:/media:rw
      # Persistence de la base SQLite (progression)
      - mediabrowser_data:/data
    environment:
      - MEDIA_ROOT=/media
      - DB_PATH=/data/progress.db
    restart: unless-stopped

volumes:
  mediabrowser_data:
