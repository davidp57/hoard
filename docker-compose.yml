services:
  hoard:
    image: ghcr.io/davidp57/hoard:main
    container_name: hoard
    user: root
    ports:
      - "8000:8000"
    volumes:
      # Ton dossier downloads sur le NAS → monté en /media dans le container
      - /volume1/downloads:/media:rw
      # Persistence de la base SQLite (progression)
      - hoard_data:/data
    environment:
      - MEDIA_ROOT=/media
      - DB_PATH=/data/progress.db
      # Uncomment to enable HTTPS (no reverse proxy needed).
      # Generate a self-signed cert: openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem -days 3650 -nodes -subj "/CN=nas.local"
      # Mount the cert folder and set these two variables:
      # - SSL_CERTFILE=/certs/cert.pem
      # - SSL_KEYFILE=/certs/key.pem
    restart: unless-stopped

    # volumes:
    #   - /path/on/nas/certs:/certs:ro
volumes:
  hoard_data:
